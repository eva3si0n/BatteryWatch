name: BatteryWatch
options:
  bundleIdPrefix: com.eva3si0n
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T6B3L4X3A9
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: "1.1"
    # Debug-dylib stub breaks widget extensions installed without Xcode attached
    ENABLE_DEBUG_DYLIB: "NO"

targets:
  BatteryWatch:
    type: application
    platform: iOS
    sources:
      - iPhone
      - Shared
    info:
      path: iPhone/Info.plist
      properties:
        CFBundleDisplayName: Battery Watch
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: iPhone/BatteryWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BatteryWatchWatch

  BatteryWatchWatch:
    type: application
    platform: watchOS
    sources:
      - Watch
      - Shared
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: Battery Watch
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.eva3si0n.batterywatch
    entitlements:
      path: Watch/BatteryWatchWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BatteryWidgetExtension

  BatteryWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: iPhone Battery
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/BatteryWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch.watchkitapp.widget
