name: BatteryWatch
options:
  bundleIdPrefix: com.eva3si0n
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T6B3L4X3A9
    # Single source of truth for versions — Info.plists reference these via
    # $(MARKETING_VERSION)/$(CURRENT_PROJECT_VERSION) so the iPhone app and its
    # embedded watch app can never drift apart (a mismatch breaks the WCSession
    # companion link).
    CURRENT_PROJECT_VERSION: 9
    MARKETING_VERSION: "1.3.0"
    # Debug-dylib stub breaks widget extensions installed without Xcode attached
    ENABLE_DEBUG_DYLIB: "NO"

targets:
  BatteryWatch:
    type: application
    platform: iOS
    sources:
      - iPhone
      - Shared
    info:
      path: iPhone/Info.plist
      properties:
        CFBundleDisplayName: Battery Watch
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.eva3si0n.batterywatch.refresh
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: iPhone/BatteryWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BatteryWatchWatch

  BatteryWatchWatch:
    type: application
    platform: watchOS
    sources:
      - Watch
      - Shared
    info:
      path: Watch/Info.plist
      properties:
        CFBundleDisplayName: Battery Watch
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.eva3si0n.batterywatch
    entitlements:
      path: Watch/BatteryWatchWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: BatteryWidgetExtension

  BatteryWidgetExtension:
    type: app-extension
    platform: watchOS
    sources:
      - Widget
      - Shared
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: iPhone Battery
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Widget/BatteryWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.eva3si0n.batterywatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eva3si0n.batterywatch.watchkitapp.widget

schemes:
  # Run this scheme to install on the iPhone — it carries the embedded watch
  # app and registers it as the WatchConnectivity companion (required for
  # delivery to the watch; a standalone watch install does NOT register it).
  BatteryWatch:
    build:
      targets:
        BatteryWatch: all
    run:
      config: Debug
    archive:
      config: Release
  BatteryWatchWatch:
    build:
      targets:
        BatteryWatchWatch: all
    run:
      config: Debug
    archive:
      config: Release
